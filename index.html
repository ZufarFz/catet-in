<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Bendahara">
    
    <title>Bendahara Pintar</title>
    
    <!-- PWA Manifest & Local PNG Icons (Path disesuaikan untuk deployment root) -->
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="apple-touch-icon" href="/icon-512.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
            background-color: #F8FAFC;
            color: #0F172A;
        }

        /* Glassmorphism Classes */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .glass-dark {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Modern Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #E2E8F0;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #CBD5E1;
        }

        /* Padding for safe areas (notches) */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .pt-safe {
            padding-top: env(safe-area-inset-top);
        }

        /* Animasi Transisi Tab */
        @keyframes tabFadeInUp {
            from { 
                opacity: 0; 
                transform: translateY(12px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        .animate-tab-entry {
            animation: tabFadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            will-change: transform, opacity;
        }

        /* Animasi Murni Geser Atas Bawah (Reveal) - Tanpa Fade */
        @keyframes listRevealDown {
            0% {
                transform: translateY(-50px) scaleY(0);
                transform-origin: top;
            }
            100% {
                transform: translateY(0) scaleY(1);
                transform-origin: top;
            }
        }

        .animate-list-reveal {
            animation: listRevealDown 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            will-change: transform;
        }

        /* Animasi Bouncing Pop-up Konfirmasi */
        @keyframes dialogBounceIn {
            0% {
                opacity: 0;
                transform: scale(0.85);
            }
            50% {
                opacity: 1;
                transform: scale(1.04);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes backdropFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-dialog-bounce {
            animation: dialogBounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            will-change: transform, opacity;
        }

        .animate-backdrop {
            animation: backdropFadeIn 0.3s ease-out forwards;
        }

        @media print {
            .no-print { display: none !important; }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "jspdf": "https://esm.sh/jspdf@^2.5.1",
    "jspdf-autotable": "https://esm.sh/jspdf-autotable@^3.8.2",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "vite": "https://esm.sh/vite@^7.3.1"
  }
}
</script>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Register Service Worker for PWA (Path disesuaikan untuk deployment root)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => console.log('Sistem Siap!', reg))
            .catch(err => console.log('Gagal inisialisasi:', err));
        });
      }
    </script>
</body>
</html>
